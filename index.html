<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>我的饮品生活手账</title>
  
  <!-- 引入 ONNX Runtime Web 与 html2canvas 海报生成库 -->
  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/ort.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <style>
    /* 1. 声明您 GitHub Pages 上的自定义字体（加入了版本号 v=2 绕过浏览器缓存） */
@font-face {
  font-family: 'Quarthck';
  /* 优先读取本地同级目录，备用读取您 GitHub Pages 上的路径 */
  src: url('./quarthck.ttf?v=2') format('truetype'),
       url('https://yitianwei083-droid.github.io/naicha1/quarthck.ttf?v=2') format('truetype');
  font-weight: normal;
  font-style: normal;
    }

    /* 极简无印风配色与版式设计 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      background-color: #f3f1ed; /* 柔和纸张灰色背景 */
      color: #1a1a1a;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      overflow: hidden;
    }

    /* 优先适配手机容器，在PC端居中呈现精美卡片 */
    .app-container {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      background-color: #fcfbfa; /* 暖白色纸张感 */
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
    }

    /* 顶部控制栏 */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px;
      font-size: 11px;
      color: #8c867e;
      letter-spacing: 1px;
      z-index: 10;
    }
    .top-bar .time { font-family: monospace; }
    .top-bar .loading-status { font-weight: bold; color: #e64a19; }

    /* 滑动卡片容器 */
    .cards-wrapper {
      flex: 1;
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .cards-wrapper::-webkit-scrollbar { display: none; } /* 隐藏滑动条 */

    /* 每一张独立的海报卡片 */
    .card {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10px 40px 40px 40px;
      position: relative;
      background-color: #fcfbfa;
    }

    /* 编辑提示铅笔图标（仅在编辑状态显示） */
    .edit-tip::after {
      content: " ✎";
      font-size: 12px;
      color: #c4beb6;
      font-weight: normal;
      opacity: 0.7;
    }

    /* 文本排版区 */
    .card-header {
      margin-top: 10px;
    }
    .editable-title {
      font-family: 'Quarthck', -apple-system, sans-serif; /* 使用您的自定义字体 */
      font-size: 32px;
      font-weight: normal;
      line-height: 1.3;
      outline: none;
      margin-bottom: 8px;
    }
    .editable-desc {
      font-size: 13px;
      color: #7c756b;
      line-height: 1.6;
      outline: none;
    }

    /* 核心图形区域 */
    .card-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 20px 0;
    }

    /* 饮品图片贴纸化（自带软投影，配合代码生成的白边实现实体贴纸效果） */
    .cup-sticker {
      max-width: 85%;
      max-height: 90%;
      object-fit: contain;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.12)); /* 软投影阴影 */
      user-select: none;
      cursor: pointer; /* 悬停变手型，提示可更换 */
    }

    /* 上传占位区 */
    .upload-box {
      width: 80%;
      height: 70%;
      border: 1px dashed #c4beb6;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #8c867e;
      transition: background 0.2s;
    }
    .upload-box:hover { background-color: #f8f6f2; }
    .upload-box .icon { font-size: 32px; margin-bottom: 10px; font-weight: 300; }
    .upload-box p { font-size: 12px; letter-spacing: 1px; }

    /* 价格圆形标签 */
    .price-badge {
      font-family: 'Quarthck', sans-serif; /* 使用您的自定义字体 */
      position: absolute;
      top: 10%;
      left: 10%;
      width: 68px;
      height: 68px;
      border: 1.5px solid #1a1a1a;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: normal;
      background: #fcfbfa;
      transform: rotate(-8deg);
      outline: none;
      z-index: 5;
    }

    /* 底部标注排版 */
    .card-footer {
      text-align: center;
    }
    .editable-spec {
      font-size: 12px;
      color: #8c867e;
      margin-bottom: 6px;
      outline: none;
    }
    .editable-disclaimer {
      font-size: 10px;
      color: #bcaea1;
      outline: none;
      line-height: 1.4;
    }

    /* 底部全局控制栏（不包含在海报内，导出时不会被截进去） */
    .bottom-bar {
      padding: 15px 20px;
      border-top: 1px solid #f3f1ed;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      background-color: #fcfbfa;
      z-index: 10;
    }

    /* 卡片指示点 */
    .dots {
      display: flex;
      gap: 6px;
    }
    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: #e5e1da;
      transition: background-color 0.3s;
    }
    .dot.active { background-color: #8c867e; }

    /* 功能按钮组 */
    .btn-group {
      display: flex;
      gap: 10px;
      width: 100%;
    }
    .btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 25px;
      font-size: 12px;
      font-weight: bold;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: background 0.2s, transform 0.1s;
    }
    .btn:active { transform: scale(0.98); }
    .btn-primary { background-color: #1a1a1a; color: #fff; }
    .btn-secondary { background-color: #f1ede6; color: #5c564e; }
    .btn-danger { background-color: #fff; border: 1px solid #ffccd0; color: #d32f2f; }
  </style>
</head>
<body>

  <div class="app-container">
    <!-- 顶部状态与时钟 -->
    <div class="top-bar">
      <div class="loading-status" id="model-status">正在连接 AI 引擎...</div>
      <div class="time" id="live-clock">0000-00-00 00:00:00</div>
    </div>

    <!-- 隐藏的图片上传控件 -->
    <input type="file" id="global-uploader" accept="image/*" style="display: none;">

    <!-- 滑动海报视口 -->
    <div class="cards-wrapper" id="cards-container">
      <!-- 默认展示第一张卡片 -->
      <div class="card" data-index="0">
        <div class="card-header">
          <div class="editable-title edit-tip" contenteditable="true">芒芭芒芭芒兰吧</div>
          <div class="editable-desc edit-tip" contenteditable="true">冰沙，花香奇兰，芭乐汁，芒果，0脂脆波波，少少甜</div>
        </div>

        <div class="card-body">
          <div class="price-badge edit-tip" contenteditable="true">¥18</div>
          <!-- 默认占位上传框 -->
          <div class="upload-box" onclick="triggerUpload(0)">
            <div class="icon">＋</div>
            <p>点击拍照生成贴纸</p>
          </div>
          <!-- 抠图完成后的图像（绑定点击重新上传逻辑） -->
          <img class="cup-sticker" style="display: none;" onclick="triggerUpload(0)" title="点击更换图片">
        </div>

        <div class="card-footer">
          <div class="editable-spec edit-tip" contenteditable="true">500ml, 不支持升杯</div>
          <div class="editable-disclaimer edit-tip" contenteditable="true">DIY风味独一无二，若实际口感与预期存在差异，敬请谅解</div>
        </div>
      </div>
    </div>

    <!-- 底部控制按钮 (此区域独立于海报卡片，导出时会自动被过滤) -->
    <div class="bottom-bar">
      <!-- 卡片指示点 -->
      <div class="dots" id="dots-container">
        <span class="dot active"></span>
      </div>
      
      <div class="btn-group">
        <button class="btn btn-secondary" onclick="addCup()">＋ 喝下一杯</button>
        <button class="btn btn-primary" onclick="saveActivePoster()">💾 保存海报</button>
        <button class="btn btn-danger" id="delete-btn" onclick="deleteCurrentCup()" style="display:none;">🗑️ 删除</button>
      </div>
    </div>
  </div>

  <script>
    // 基础 CDN 配置
    ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.18.0/dist/";
    const MODEL_URL = "https://huggingface.co/IsGarrido/RMBG-1.4/resolve/main/onnx/model_quantized.onnx";

    let session = null;
    let activeCardIndex = 0;
    let targetUploadIndex = 0; // 记录当前上传的目标卡片索引

    // 动态时钟逻辑
    function updateClock() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      document.getElementById("live-clock").innerText = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 异步启动并预加载 AI 模型
    async function loadModel() {
      try {
        session = await ort.InferenceSession.create(MODEL_URL);
        document.getElementById("model-status").innerText = "AI 贴纸引擎就绪";
        document.getElementById("model-status").style.color = "#4caf50";
      } catch (err) {
        console.error(err);
        document.getElementById("model-status").innerText = "引擎初始化失败";
      }
    }
    loadModel();

    // 触发隐藏的上传表单
    function triggerUpload(cardIndex) {
      if(!session) return alert("AI 贴纸引擎正在启动，请稍等几秒...");
      targetUploadIndex = cardIndex;
      document.getElementById("global-uploader").click();
    }

    // 监听上传控件事件
    document.getElementById("global-uploader").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if(!file) return;

      document.getElementById("model-status").innerText = "正在分析边缘...";
      document.getElementById("model-status").style.color = "#e64a19";

      const reader = new FileReader();
      reader.onload = async function(ev) {
        const tempImg = new Image();
        tempImg.src = ev.target.result;
        tempImg.onload = async function() {
          // 运行抠图并自动渲染白边
          const dataUrl = await processAndOutline(tempImg);
          
          // 将贴纸更新渲染到对应卡片
          const card = document.querySelector(`.card[data-index="${targetUploadIndex}"]`);
          if(card) {
            const uploadBox = card.querySelector(".upload-box");
            const imgEl = card.querySelector(".cup-sticker");
            uploadBox.style.display = "none";
            imgEl.src = dataUrl;
            imgEl.style.display = "block";
          }
          
          document.getElementById("model-status").innerText = "AI 贴纸引擎就绪";
          document.getElementById("model-status").style.color = "#4caf50";
        }
      }
      reader.readAsDataURL(file);
      e.target.value = ""; // 清空缓存支持二次上传
    });

    // 图像预处理
    function preProcessImage(imgEl) {
      const size = 1024;
      const canvas = document.createElement("canvas");
      canvas.width = size; canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(imgEl, 0, 0, size, size);
      
      const imageData = ctx.getImageData(0, 0, size, size);
      const { data } = imageData;
      const float32Data = new Float32Array(3 * size * size);
      
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const idx = (y * size + x) * 4;
          const pos = y * size + x;
          float32Data[pos] = (data[idx] / 255.0) - 0.5;
          float32Data[size * size + pos] = (data[idx + 1] / 255.0) - 0.5;
          float32Data[2 * size * size + pos] = (data[idx + 2] / 255.0) - 0.5;
        }
      }
      return {
        tensor: new ort.Tensor("float32", float32Data, [1, 3, size, size]),
        w: imgEl.naturalWidth,
        h: imgEl.naturalHeight
      };
    }

    // 图像算法：AI抠图后在像素层面渲染实体贴纸边缘 (确保完美的一键导出效果)
    async function processAndOutline(imgEl) {
      const { tensor, w, h } = preProcessImage(imgEl);
      
      const feeds = {};
      feeds[session.inputNames[0]] = tensor;
      const outputs = await session.run(feeds);
      const maskData = outputs[session.outputNames[0]].data;

      // 1. 构建 1024x1024 的二值化黑白遮罩 Canvas
      const maskCanvas = document.createElement("canvas");
      maskCanvas.width = 1024; maskCanvas.height = 1024;
      const mCtx = maskCanvas.getContext("2d");
      const mImgData = mCtx.createImageData(1024, 1024);
      for(let i=0; i<maskData.length; i++) {
        const val = maskData[i];
        const alpha = val > 0.5 ? 255 : 0; 
        const idx = i * 4;
        mImgData.data[idx] = 255; mImgData.data[idx+1] = 255; mImgData.data[idx+2] = 255;
        mImgData.data[idx+3] = alpha;
      }
      mCtx.putImageData(mImgData, 0, 0);

      // 2. 限制图像最大尺寸在 1200 像素内（保证画面不糊，同时优化运行内存）
      const maxOutputSize = 1200;
      let outW = w, outH = h;
      if(outW > maxOutputSize || outH > maxOutputSize) {
        const scale = maxOutputSize / Math.max(outW, outH);
        outW = Math.round(outW * scale);
        outH = Math.round(outH * scale);
      }

      const originCanvas = document.createElement("canvas");
      originCanvas.width = outW; originCanvas.height = outH;
      const oCtx = originCanvas.getContext("2d");
      oCtx.drawImage(imgEl, 0, 0, outW, outH);

      const resizedMaskCanvas = document.createElement("canvas");
      resizedMaskCanvas.width = outW; resizedMaskCanvas.height = outH;
      const rmCtx = resizedMaskCanvas.getContext("2d");
      rmCtx.drawImage(maskCanvas, 0, 0, outW, outH);

      // 3. 像素融合
      const borderSize = 12; // 贴纸白边粗细 (像素)
      const paddedW = outW + borderSize * 2 + 10;
      const paddedH = outH + borderSize * 2 + 10;

      const finalCanvas = document.createElement("canvas");
      finalCanvas.width = paddedW; finalCanvas.height = paddedH;
      const fCtx = finalCanvas.getContext("2d");

      const cutoutCanvas = document.createElement("canvas");
      cutoutCanvas.width = outW; cutoutCanvas.height = outH;
      const cCtx = cutoutCanvas.getContext("2d");
      const originalImgData = oCtx.getImageData(0,0,outW,outH);
      const rMaskImgData = rmCtx.getImageData(0,0,outW,outH);
      for(let i=0; i<originalImgData.data.length/4; i++) {
        const idx = i*4;
        originalImgData.data[idx+3] = rMaskImgData.data[idx+3];
      }
      cCtx.putImageData(originalImgData,0,0);

      // 4. 径向膨胀白边算法
      const steps = 32; 
      const centerOffsetX = borderSize + 5;
      const centerOffsetY = borderSize + 5;
      
      for(let i=0; i<steps; i++) {
        const angle = (i / steps) * Math.PI * 2;
        const dx = Math.cos(angle) * borderSize + centerOffsetX;
        const dy = Math.sin(angle) * borderSize + centerOffsetY;
        fCtx.drawImage(cutoutCanvas, dx, dy);
      }
      fCtx.globalCompositeOperation = "source-in";
      fCtx.fillStyle = "#ffffff";
      fCtx.fillRect(0, 0, paddedW, paddedH);

      fCtx.globalCompositeOperation = "source-over";
      fCtx.drawImage(cutoutCanvas, centerOffsetX, centerOffsetY);

      return finalCanvas.toDataURL("image/png");
    }

    // ➕ 创建新卡片
    function addCup() {
      const container = document.getElementById("cards-container");
      const nextIndex = container.children.length;

      const cardHtml = `
        <div class="card" data-index="${nextIndex}">
          <div class="card-header">
            <div class="editable-title edit-tip" contenteditable="true">我的新调饮</div>
            <div class="editable-desc edit-tip" contenteditable="true">点击输入配料、冰度、糖度甜品描述...</div>
          </div>
          <div class="card-body">
            <div class="price-badge edit-tip" contenteditable="true">¥15</div>
            <div class="upload-box" onclick="triggerUpload(${nextIndex})">
              <div class="icon">＋</div>
              <p>点击拍照生成贴纸</p>
            </div>
            <img class="cup-sticker" style="display: none;" onclick="triggerUpload(${nextIndex})" title="点击更换图片">
          </div>
          <div class="card-footer">
            <div class="editable-spec edit-tip" contenteditable="true">500ml, 不支持升杯</div>
            <div class="editable-disclaimer edit-tip" contenteditable="true">DIY风味独一无二，若实际口感与预期存在差异，敬请谅解</div>
          </div>
        </div>
      `;
      container.insertAdjacentHTML('beforeend', cardHtml);
      updateIndicators();
      
      // 自动横向滑动切换至新卡片
      setTimeout(() => {
        container.scrollTo({ left: container.clientWidth * nextIndex, behavior: "smooth" });
      }, 50);
    }

    // 🗑️ 删除卡片
    function deleteCurrentCup() {
      const container = document.getElementById("cards-container");
      if(container.children.length <= 1) return; 
      
      if(confirm("确定要删除当前这一杯的手账吗？")) {
        const activeCard = container.children[activeCardIndex];
        activeCard.remove();
        
        // 重新排布序号与事件索引
        Array.from(container.children).forEach((card, idx) => {
          card.setAttribute("data-index", idx);
          const uploadBox = card.querySelector(".upload-box");
          if(uploadBox) {
            uploadBox.setAttribute("onclick", `triggerUpload(${idx})`);
          }
          const imgEl = card.querySelector(".cup-sticker");
          if(imgEl) {
            imgEl.setAttribute("onclick", `triggerUpload(${idx})`);
          }
        });
        
        const targetIdx = Math.max(0, activeCardIndex - 1);
        updateIndicators();
        container.scrollTo({ left: container.clientWidth * targetIdx, behavior: "smooth" });
      }
    }

    // 同步刷新圆点与按键状态
    function updateIndicators() {
      const container = document.getElementById("cards-container");
      const dotsContainer = document.getElementById("dots-container");
      const total = container.children.length;
      
      dotsContainer.innerHTML = "";
      for (let i = 0; i < total; i++) {
        const dot = document.createElement("span");
        dot.className = `dot ${i === activeCardIndex ? 'active' : ''}`;
        dotsContainer.appendChild(dot);
      }

      document.getElementById("delete-btn").style.display = total > 1 ? "block" : "none";
    }

    // 监听横向滑动事件
    document.getElementById("cards-container").addEventListener("scroll", (e) => {
      const container = e.target;
      const index = Math.round(container.scrollLeft / container.clientWidth);
      if(index !== activeCardIndex && index >= 0 && index < container.children.length) {
        activeCardIndex = index;
        updateIndicators();
      }
    });

    // 💾 保存卡片海报到相册/本地
    function saveActivePoster() {
      window.getSelection().removeAllRanges(); // 取消光标高亮
      
      const container = document.getElementById("cards-container");
      const activeCard = container.children[activeCardIndex];

      // 临时移出铅笔小标记 ✎ 样式，避免被截入图片
      const editableElements = activeCard.querySelectorAll(".edit-tip");
      editableElements.forEach(el => el.classList.remove("edit-tip"));

      html2canvas(activeCard, {
        scale: 2, // 导出两倍超清大图
        useCORS: true,
        backgroundColor: "#fcfbfa"
      }).then(canvas => {
        // 还原铅笔标记样式
        editableElements.forEach(el => el.classList.add("edit-tip"));

        // 下载保存
        const link = document.createElement("a");
        link.download = `我的饮品手账_${activeCardIndex + 1}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      }).catch(err => {
        console.error(err);
        alert("海报生成失败，请确认是否在服务器（http://）环境下运行本页面。");
        editableElements.forEach(el => el.classList.add("edit-tip"));
      });
    }

    updateIndicators();
  </script>
</body>
</html>
