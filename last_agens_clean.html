<script>
// ==================== CONFIG ====================
var SUPABASE_URL = "https://aofkjwmgatevizymjnze.supabase.co";

var AGNES_API_URL = "https://apihub.agnes-ai.com/v1/images/generations";
var AGNES_MODEL = "agnes-image-2.0-flash";
var AGNES_CUTOUT_PROMPT = "Replace the original background of this photo with a pure solid white (#FFFFFF) background. Keep the main subject completely unchanged -- no style changes, no illustration, no cartoon effects, no sticker effects. Remove everything that is not the main subject.";
var WHITE_THRESHOLD = 252;

// ==================== CLOCK ====================
function updateClock() {

  var pad = function(x) { return String(x).padStart(2, "0"); };
  document.getElementById("live-clock").innerText =
    n.getFullYear() + "-" + pad(n.getMonth()+1) + "-" + pad(n.getDate()) + " " +
    pad(n.getHours()) + ":" + pad(n.getMinutes()) + ":" + pad(n.getSeconds());
}

// ==================== UTILS ====================
function escHtml(s) {
  return (String(s || "")).replace(/&/g,"&amp;").replace(/</g,"&lt;")
    .replace(/>/g,"&gt;").replace(/"/g,"&quot;");
}

function loadOriginalImageSize(file) {
  return new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() {
      var img = new Image();
      img.onload = function() { resolve({ width: img.naturalWidth, height: img.naturalHeight }); };
      img.onerror = function() { resolve({ width: 1024, height: 1024 }); };
      img.src = reader.result;
    };
    reader.onerror = function() { reject("File read error"); };
    reader.readAsDataURL(file);
  });
}

// Pick best Agnes size to minimize distortion vs original aspect ratio
function pickBestAgnesSize(imgW, imgH) {
  if (imgW === imgH) return "1024x1024";
  var srcAspect = imgW / imgH;
  var options = [
    { label: "1024x768",  aspect: 1024/768 },
    { label: "768x1024",  aspect: 768/1024 },
    { label: "1024x1024", aspect: 1 }
  ];
  var best = options[2], minDiff = Infinity;
  for (var i = 0; i < options.length; i++) {
    var d = Math.abs(srcAspect - options[i].aspect);
    if (d < minDiff) { minDiff = d; best = options[i]; }
  }
  return best.label;
}

// ==================== LOCAL ONNX FALLBACK ====================
async function loadLocalModel() {
  var el = document.getElementById("model-status");
  try {
    session = await ort.InferenceSession.create(MODEL_URL, { executionProviders: ['webgl'] });
    el.innerText = "Engine Ready";
    el.style.color = "#4caf50";
  } catch(err) {
    try {
      session = await ort.InferenceSession.create(MODEL_URL, { executionProviders: ['wasm'] });
      el.innerText = "Engine Ready (WASM)";
      el.style.color = "#4caf50";
    } catch(wasmErr) {
      console.error("Model load failed:", wasmErr);
      el.innerText = "Load Failed";
      el.style.color = "#ff5252";
    }
  }
}

async function processLocally(imgEl) {
  var size = 1024;
  var canvas = document.createElement("canvas");
  canvas.width = size; canvas.height = size;
  var ctx = canvas.getContext("2d");
  ctx.drawImage(imgEl, 0, 0, size, size);

  var imageData = ctx.getImageData(0, 0, size, size);
  var data = imageData.data;
  var float32Data = new Float32Array(3 * size * size);
  for (var y = 0; y < size; y++) {
    for (var x = 0; x < size; x++) {
      var idx = (y * size + x) * 4;
      var pos = y * size + x;
      float32Data[pos] = (data[idx] / 255.0) - 0.5;
      float32Data[size * size + pos] = (data[idx + 1] / 255.0) - 0.5;
      float32Data[2 * size * size + pos] = (data[idx + 2] / 255.0) - 0.5;
    }
  }

  var tensor = new ort.Tensor("float32", float32Data, [1, 3, size, size]);
  var feeds = {};
  feeds[session.inputNames[0]] = tensor;
  var outputs = await session.run(feeds);
  var maskData = outputs[session.outputNames[0]].data;

  var maskCanvas = document.createElement("canvas");
  maskCanvas.width = 1024; maskCanvas.height = 1024;
  var mCtx = maskCanvas.getContext("2d");
  var mImgData = mCtx.createImageData(1024, 1024);
  for (var i = 0; i < maskData.length; i++) {
    var alpha = maskData[i] > 0.5 ? 255 : 0;
    var idx = i * 4;
    mImgData.data[idx] = 255;
    mImgData.data[idx+1] = 255;
    mImgData.data[idx+2] = 255;
    mImgData.data[idx+3] = alpha;
  }
  mCtx.putImageData(mImgData, 0, 0);

  var maxOutput = 800;
  var outW = imgEl.naturalWidth, outH = imgEl.naturalHeight;
  if (outW > maxOutput || outH > maxOutput) {
    var sc = maxOutput / Math.max(outW, outH);
    outW = Math.round(outW * sc);
    outH = Math.round(outH * sc);
  }

  var originCanvas = document.createElement("canvas");
  originCanvas.width = outW; originCanvas.height = outH;
  var oCtx = originCanvas.getContext("2d");
  oCtx.drawImage(imgEl, 0, 0, outW, outH);

  var resizedMask = document.createElement("canvas");
  resizedMask.width = outW; resizedMask.height = outH;
  var rmCtx = resizedMask.getContext("2d");
  rmCtx.drawImage(maskCanvas, 0, 0, outW, outH);

  var cutoutCanvas = document.createElement("canvas");
  cutoutCanvas.width = outW; cutoutCanvas.height = outH;
  var cCtx = cutoutCanvas.getContext("2d");
  var origData = oCtx.getImageData(0, 0, outW, outH);
  var maskData2 = rmCtx.getImageData(0, 0, outW, outH);
  for (var j = 0; j < origData.data.length / 4; j++) {
    origData.data[j*4+3] = maskData2.data[j*4+3];
  }
  cCtx.putImageData(origData, 0, 0);

  // Add white border via 32-direction expansion
  var border = 12;
  var paddedW = outW + border * 2 + 10;
  var paddedH = outH + border * 2 + 10;
  var finalCanvas = document.createElement("canvas");
  finalCanvas.width = paddedW; finalCanvas.height = paddedH;
  var fCtx = finalCanvas.getContext("2d");
  var ox = border + 5, oy = border + 5;
  for (var k = 0; k < 32; k++) {
    var angle = (k / 32) * Math.PI * 2;
    fCtx.drawImage(cutoutCanvas, Math.cos(angle)*border + ox, Math.sin(angle)*border + oy);
  }
  fCtx.globalCompositeOperation = "source-in";
  fCtx.fillStyle = "#ffffff";
  fCtx.fillRect(0, 0, paddedW, paddedH);
  fCtx.globalCompositeOperation = "source-over";
  fCtx.drawImage(cutoutCanvas, ox, oy);
  return finalCanvas.toDataURL("image/png");
}

// ==================== AGNES CUTOFF + ORIGINAL SIZE COMPOSITE ====================
async function processWithAgnes(file) {
  var dim = await loadOriginalImageSize(file);
  var agnesSize = pickBestAgnesSize(dim.width, dim.height);

  var base64Image = await new Promise(function(resolve, reject) {
    var reader = new FileReader();
    reader.onload = function() { resolve(reader.result); };
    reader.onerror = function() { reject(new Error("File read error")); };
    reader.readAsDataURL(file);
  });

  var response = await fetch(AGNES_API_URL, {
    method: "POST",
    headers: {
      "Authorization": "Bearer " + AGNES_API_KEY,
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      model: AGNES_MODEL,
      prompt: AGNES_CUTOUT_PROMPT,
      size: agnesSize,
      extra_body: {
        image: [base64Image],
        response_format: "b64_json"
      }
    })
  });

  if (!response.ok) {
    var errData = await response.json().catch(function(){ return {}; });
    throw new Error(errData.error?.message || ("Agnes API error: " + response.status));
  }

  var data = await response.json();
  var result = data.data[0];
  if (!result) throw new Error("No result from Agnes");

  var rawSrc;
  if (result.b64_json) {
    rawSrc = "data:image/png;base64," + result.b64_json;
  } else if (result.url) {
    var blob = await (await fetch(result.url)).blob();
    rawSrc = URL.createObjectURL(blob);
  } else {
    throw new Error("Bad response format from Agnes");
  }

  // Composite into original dimensions so image is not distorted
  return compositeAtOriginalSize(rawSrc, dim.width, dim.height);
}

async function compositeAtOriginalSize(agnesSrc, origW, origH) {
  var img = new Image();
  img.src = agnesSrc;
  await new Promise(function(r) { img.onload = r; });

  var agnesW = img.naturalWidth;
  var agnesH = img.naturalHeight;
  var scale = Math.min(origW / agnesW, origH / agnesH);
  var drawW = Math.round(agnesW * scale);
  var drawH = Math.round(agnesH * scale);
  var offsetX = Math.round((origW - drawW) / 2);
  var offsetY = Math.round((origH - drawH) / 2);

  var canvas = document.createElement("canvas");
  canvas.width = origW;
  canvas.height = origH;
  var ctx = canvas.getContext("2d");

  // Fill white background first
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0, 0, origW, origH);

  // Paste Agnes result (no stretching, centered)
  ctx.drawImage(img, offsetX, offsetY, drawW, drawH);

  // Remove white pixels (RGB > threshold => alpha = 0)
  var imageData = ctx.getImageData(0, 0, origW, origH);
  var pixels = imageData.data;
  for (var i = 0; i < pixels.length; i += 4) {
    if (pixels[i] >= WHITE_THRESHOLD && pixels[i+1] >= WHITE_THRESHOLD && pixels[i+2] >= WHITE_THRESHOLD) {
      pixels[i+3] = 0;
    }
  }
  ctx.putImageData(imageData, 0, 0);

  return canvas.toDataURL("image/png");
}

// ==================== UPLOAD HANDLER ====================
function triggerUpload(cardIndex) {
  if (isProcessing) { alert("Processing, please wait..."); return; }
  targetUploadIndex = cardIndex;
  document.getElementById("global-uploader").click();
}

function showProgress(step) {
  var el = document.getElementById("progress-" + targetUploadIndex);
  if (!el) return;
  el.classList.add("active");
  var labels = {
    uploading: "Uploading...",
    processing: "Agnes removing background...",
    masking: "Cleaning background...",
    saving: "Saving...",
    success: "Done!"
  };
  var widths = {
    uploading: "20%", processing: "50%", masking: "75%", saving: "90%", success: "100%"
  };
  el.querySelector(".progress-text").innerText = labels[step] || "Processing...";
  el.querySelector(".progress-fill").style.width = widths[step] || "50%";
}
function hideProgress() {
  var el = document.getElementById("progress-" + targetUploadIndex);
  if (el) el.classList.remove("active");
}

document.getElementById("global-uploader").addEventListener("change", async function(e) {
  var file = e.target.files[0];
  if (!file) return;

  isProcessing = true;
  var st = document.getElementById("model-status");
  st.innerText = "Uploading...";
  st.style.color = "#e64a19";
  showProgress("uploading");

  try {
    var dataUrl;

    // Try Agnes first
    try {
      st.innerText = "Agnes removing background...";
      showProgress("processing");
      dataUrl = await processWithAgnes(file);
      showProgress("masking");
      st.innerText = "Saving...";
      showProgress("saving");
    } catch(apiError) {
      console.warn("Agnes failed, falling back to local:", apiError);
      st.innerText = "Agnes unavailable, using local...";
      if (!session) { await loadLocalModel(); }
      var tempImg = new Image();
      tempImg.src = URL.createObjectURL(file);
      await new Promise(function(r){ tempImg.onload = r; });
      dataUrl = await processLocally(tempImg);
    }

    // Save and render
    cardsData[targetUploadIndex].stickerSrc = dataUrl;
    await saveCardToStorage(cardsData[targetUploadIndex]);
    renderAllCards();
    renderCalendarGrid();

    st.innerText = "Engine Ready";
    st.style.color = "#4caf50";
    showProgress("success");
    setTimeout(hideProgress, 1000);
  } catch(err) {
    console.error("Process failed:", err);
    st.innerText = "Failed";
    st.style.color = "#ff5252";
    alert("Process failed: " + err.message);
    hideProgress();
  } finally {
    isProcessing = false;
    e.target.value = "";
  }
});

// ==================== STORAGE ====================
async function loadAllCards() {
  if (useCloud && supabaseClient) {
    try {
      var result = await supabaseClient.from('milk_tea_cards').select('*').order('date', { ascending: true });
      if (result.error) throw result.error;
      cardsData = result.data.map(function(item) {
        return { id:item.id, title:item.title, date:item.date, desc:item.desc, spec:item.spec, disclaimer:item.disclaimer, stickerSrc:item.sticker_url };
      });
    } catch(e) {
      console.error("Cloud load failed:", e);
      loadFromLocal();
      renderAllCards(); renderCalendarGrid();
      return;
    }
  } else {
    loadFromLocal();
  }
  if (cardsData.length === 0) {
    cardsData.push({
      id: String(Date.now()), title: "My New Drink",
      date: new Date().toISOString().slice(0,10),
      desc: "Click to edit ingredients...",
      spec: "500ml, No cup upgrade",
      disclaimer: "Each DIY flavor is unique, taste may vary.",
      stickerSrc: ""
    });
  }
  renderAllCards();
  renderCalendarGrid();
}

function loadFromLocal() {
  var cache = localStorage.getItem('tady_dreak_cards');
  if (cache) cardsData = JSON.parse(cache);
}

async function saveCardToStorage(card) {
  if (useCloud && supabaseClient) {
    try {
      var imageUrl = card.stickerSrc;
      if (card.stickerSrc && card.stickerSrc.startsWith('data:image')) {
        var blob = await (await fetch(card.stickerSrc)).blob();
        var fileName = "sticker_" + card.id + ".png";
        await supabaseClient.storage.from('stickers').upload(fileName, blob, { cacheControl: '3600', upsert: true });
        var publicResult = supabaseClient.storage.from('stickers').getPublicUrl(fileName);
        imageUrl = publicResult.data.publicUrl;
        card.stickerSrc = imageUrl;
      }
      await supabaseClient.from('milk_tea_cards').upsert({
        id: card.id, title: card.title, date: card.date,
        desc: card.desc, spec: card.spec, disclaimer: card.disclaimer,
        sticker_url: imageUrl || ""
      }, { onConflict: 'id' });
    } catch(e) {
      console.error("Cloud save failed:", e);
      localStorage.setItem('tady_dreak_cards', JSON.stringify(cardsData));
    }
  } else {
    localStorage.setItem('tady_dreak_cards', JSON.stringify(cardsData));
  }
}

async function deleteCardFromStorage(cardId) {
  if (useCloud && supabaseClient) {
    try {
      await supabaseClient.from('milk_tea_cards').delete().eq('id', cardId);
      await supabaseClient.storage.from('stickers').remove(['sticker_' + cardId + '.png']);
    } catch(e) { console.error("Cloud delete failed:", e); }
  }
  localStorage.setItem('tady_dreak_cards', JSON.stringify(cardsData));
}

// ==================== RENDER CARDS ====================
function renderAllCards() {
  var container = document.getElementById("cards-container");
  container.innerHTML = "";
  cardsData.forEach(function(card, index) {
    var html = '<div class="card" data-id="' + card.id + '" data-index="' + index + '">' +
      '<div class="card-header">' +
        '<div class="editable-title edit-tip" contenteditable="true" onblur="onCardFieldChange(\'' + card.id + '\',\'title\',' + JSON.stringify(escHtml(card.title)) + ')">' + escHtml(card.title) + '</div>' +
        '<div class="editable-date edit-tip" contenteditable="true" onblur="onCardDateChange(\'' + card.id + '\',this)">' + escHtml(card.date) + '</div>' +
        '<div class="editable-desc edit-tip" contenteditable="true" onblur="onCardFieldChange(\'' + card.id + '\',\'desc\',' + JSON.stringify(escHtml(card.desc)) + ')">' + escHtml(card.desc) + '</div>' +
      '</div>' +
      '<div class="card-body">' +
        '<div class="upload-box" onclick="triggerUpload(' + index + ')" style="display:' + (card.stickerSrc ? 'none' : 'flex') + '">' +
          '<div class="icon">\uFF0B</div><p>Click to remove background</p>' +
        '</div>' +
        '<img class="cup-sticker" src="' + (card.stickerSrc||'') + '" style="display:' + (card.stickerSrc ? 'block' : 'none') + '" onclick="triggerUpload(' + index + ')" title="Click to change image">' +
        '<div class="upload-progress" id="progress-' + index + '">' +
          '<div class="spinner"></div><div class="progress-text">Uploading...</div>' +
          '<div class="progress-bar"><div class="progress-fill"></div></div>' +
        '</div>' +
      '</div>' +
      '<div class="card-footer">' +
        '<div class="editable-spec edit-tip" contenteditable="true" onblur="onCardFieldChange(\'' + card.id + '\',\'spec\',' + JSON.stringify(escHtml(card.spec)) + ')">' + escHtml(card.spec) + '</div>' +
        '<div class="editable-disclaimer edit-tip" contenteditable="true" onblur="onCardFieldChange(\'' + card.id + '\',\'disclaimer\',' + JSON.stringify(escHtml(card.disclaimer)) + ')">' + escHtml(card.disclaimer) + '</div>' +
      '</div>' +
    '</div>';
    container.insertAdjacentHTML('beforeend', html);
  });
  updateIndicators();
}

function onCardFieldChange(cardId, field, value) {
  var card = cardsData.find(function(c){ return c.id === cardId; });
  if (card) {
    card[field] = value.trim();
    saveCardToStorage(card);
    renderCalendarGrid();
  }
}

function onCardDateChange(cardId, element) {
  var dateText = element.innerText.trim();
  if (!/^\d{4}-\d{2}-\d{2}$/.test(dateText)) {
    alert("Invalid date format. Please use YYYY-MM-DD (e.g. 2026-07-13)");
    var card = cardsData.find(function(c){ return c.id === cardId; });
    element.innerText = card ? card.date : "2026-07-13";
    return;
  }
  var card = cardsData.find(function(c){ return c.id === cardId; });
  if (card) {
    card.date = dateText;
    saveCardToStorage(card);
    renderCalendarGrid();
  }
}

// ==================== ADD / DELETE / INDICATORS ====================
async function addCup(targetDateString) {
  var d = targetDateString;
  if (!d) {
    var t = new Date();
    var pad = function(x){return String(x).padStart(2,"0")};
    d = t.getFullYear()+"-"+pad(t.getMonth()+1)+"-"+pad(t.getDate());
  }
  cardsData.push({
    id: String(Date.now()), title:"New drink", date:d,
    desc:"Click to edit ingredients...",
    spec:"500ml, No cup upgrade",
    disclaimer:"Each DIY flavor is unique, taste may vary.",
    stickerSrc:""
  });
  await saveCardToStorage(cardsData[cardsData.length-1]);
  renderAllCards();
  renderCalendarGrid();
  if (currentViewMode !== "card") toggleMainView();
  var container = document.getElementById("cards-container");
  setTimeout(function(){
    container.scrollTo({ left: container.clientWidth * (cardsData.length-1), behavior:"smooth" });
  }, 50);
}

function deleteCurrentCup() {
  if (cardsData.length <= 1) return;
  if (!confirm("Delete this journal entry?")) return;
  var activeCard = cardsData[activeCardIndex];
  cardsData.splice(activeCardIndex, 1);
  deleteCardFromStorage(activeCard.id);
  var targetIdx = Math.max(0, activeCardIndex - 1);
  activeCardIndex = targetIdx;
  renderAllCards();
  renderCalendarGrid();
  document.getElementById("cards-container").scrollTo({ left: document.getElementById("cards-container").clientWidth * targetIdx });
}

function updateIndicators() {
  var dotsContainer = document.getElementById("dots-container");
  dotsContainer.innerHTML = "";
  for (var i = 0; i < cardsData.length; i++) {
    var dot = document.createElement("span");
    dot.className = "dot" + (i === activeCardIndex ? " active" : "");
    dotsContainer.appendChild(dot);
  }
  document.getElementById("delete-btn").style.display = cardsData.length > 1 ? "block" : "none";
}

document.getElementById("cards-container").addEventListener("scroll", function(e) {
  var container = e.target;
  var index = Math.round(container.scrollLeft / container.clientWidth);
  if (index !== activeCardIndex && index >= 0 && index < container.children.length) {
    activeCardIndex = index;
    updateIndicators();
  }
});

// ==================== POSTER SAVE ====================
function saveActivePoster() {
  window.getSelection().removeAllRanges();
  var container = document.getElementById("cards-container");
  var activeCard = container.children[activeCardIndex];
  var editableElements = activeCard.querySelectorAll(".edit-tip");
  editableElements.forEach(function(el){ el.classList.remove("edit-tip"); });

  html2canvas(activeCard, { scale: 2, useCORS: true, backgroundColor: "#fcfbfa" }).then(function(canvas) {
    editableElements.forEach(function(el){ el.classList.add("edit-tip"); });
    var link = document.createElement("a");
    link.download = "milk_tea_journal_" + (activeCardIndex+1) + ".png";
    link.href = canvas.toDataURL("image/png");
    link.click();
  }).catch(function(err) {
    console.error(err);
    alert("Poster generation failed.");
    editableElements.forEach(function(el){ el.classList.add("edit-tip"); });
  });
}

// ==================== TOGGLE VIEW ====================
function toggleMainView() {
  var cardWrapper = document.getElementById("cards-container");
  var calView = document.getElementById("calendar-view");
  var dots = document.getElementById("dots-container");
  var toggleText = document.getElementById("toggle-view-btn");

  if (currentViewMode === "card") {
    currentViewMode = "calendar";
    cardWrapper.style.display = "none";
    calView.style.display = "flex";
    dots.style.display = "none";
    toggleText.innerText = "Card View";
    renderCalendarGrid();
  } else {
    currentViewMode = "card";
    cardWrapper.style.display = "flex";
    calView.style.display = "none";
    dots.style.display = "flex";
    toggleText.innerText = "Calendar View";
    setTimeout(function(){ cardWrapper.scrollTo({ left: cardWrapper.clientWidth * activeCardIndex }); }, 10);
  }
}

// ==================== CALENDAR ====================
function renderCalendarGrid() {
  var grid = document.getElementById("calendar-grid-cells");
  grid.innerHTML = "";
  document.getElementById("calendar-month-title").innerText = monthNames[calendarMonth] + " " + calendarYear;

  var firstDay = new Date(calendarYear, calendarMonth, 1).getDay();
  var totalDays = new Date(calendarYear, calendarMonth + 1, 0).getDate();
  var today = new Date();

  for (var i = 0; i < firstDay; i++) {
    var emptyCell = document.createElement("div");
    emptyCell.className = "calendar-cell empty";
    grid.appendChild(emptyCell);
  }

  for (var day = 1; day <= totalDays; day++) {
    var cell = document.createElement("div");
    cell.className = "calendar-cell";
    var pad = function(x){ return String(x).padStart(2,"0"); };
    var cellDateStr = calendarYear + "-" + pad(calendarMonth+1) + "-" + pad(day);

    if (calendarYear === today.getFullYear() && calendarMonth === today.getMonth() && day === today.getDate()) {
      cell.classList.add("today");
    }

    var matchedCard = cardsData.find(function(c){ return c.date === cellDateStr; });

    if (matchedCard) {
      if (matchedCard.stickerSrc) {
        var thumb = document.createElement("img");
        thumb.src = matchedCard.stickerSrc;
        thumb.className = "calendar-cell-sticker";
        cell.appendChild(thumb);
      } else {
        var numLabel = document.createElement("div");
        numLabel.className = "day-number";
        numLabel.innerText = day;
        cell.appendChild(numLabel);
      }
      cell.onclick = function(){
        var targetIdx = cardsData.indexOf(matchedCard);
        activeCardIndex = targetIdx;
        updateIndicators();
        toggleMainView();
      };
    } else {
      var dayLabel = document.createElement("div");
      dayLabel.className = "day-number";
      dayLabel.innerText = day;
      cell.appendChild(dayLabel);
      cell.onclick = function(){
        if (confirm("No journal for " + cellDateStr + ", create one?")) {
          addCup(cellDateStr);
          activeCardIndex = cardsData.length - 1;
          updateIndicators();
          triggerUpload(cardsData.length - 1);
        }
      };
    }
    grid.appendChild(cell);
  }
}

function navigateMonth(direction) {
  calendarMonth += direction;
  if (calendarMonth > 11) { calendarMonth = 0; calendarYear += 1; }
  else if (calendarMonth < 0) { calendarMonth = 11; calendarYear -= 1; }
  renderCalendarGrid();
}

loadAllCards();
</script>
