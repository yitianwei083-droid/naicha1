<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>Tady Dreak</title>
  
  <!-- ==============================
       抠图方案：Remove.bg API + 本地 ONNX 降级兜底
       优先云端：约 1-2 秒完成
       断网降级：本地 ONNX（较慢）
  ============================== -->
  <script src="https://cdn.bootcdn.net/ajax/libs/onnxruntime-web/1.18.0/ort.min.js"></script>
  <script src="https://cdn.bootcdn.net/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  
  <!-- 引入官方主站的 Supabase 全球 CDN 脚本库 -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    /* 1. 声明自定义字体 */
    @font-face {
      font-family: 'Wanwan';
      src: url('./wanwan1.ttf?v=1') format('truetype'),
           url('https://yitianwei083-droid.github.io/naicha1/wanwan1.ttf?v=1') format('truetype');
      font-weight: normal;
      font-style: normal;
    }

    /* 全局重置 */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #f3f1ed;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* 手机端全屏容器 */
    .app-container {
      width: 100%;
      max-width: 500px;
      height: 100vh;
      height: 100dvh;
      background-color: #fcfbfa;
      display: flex;
      flex-direction: column;
      position: relative;
      box-shadow: 0 10px 30px rgba(0,0,0,0.05);
      padding-top: env(safe-area-inset-top);
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* 顶部控制栏 */
    .top-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 15px 24px 5px 24px;
      font-size: 11px;
      color: #8c867e;
      letter-spacing: 1px;
      z-index: 10;
    }
    .top-bar .time { font-family: monospace; }
    .top-bar .loading-status { font-weight: bold; color: #e64a19; }

    /* --- 视图1：卡片滑动区域 --- */
    .cards-wrapper {
      flex: 1;
      display: flex;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .cards-wrapper::-webkit-scrollbar { display: none; }

    .card {
      flex: 0 0 100%;
      width: 100%;
      height: 100%;
      scroll-snap-align: start;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 10px 32px 25px 32px;
      position: relative;
      background-color: #fcfbfa;
    }

    .edit-tip::after {
      content: " ✎";
      font-size: 11px;
      color: #c4beb6;
      font-weight: normal;
      opacity: 0.6;
    }

    .card-header { 
      margin-top: 5px; 
      flex-shrink: 0; 
    }
    .editable-title {
      font-family: 'Wanwan', -apple-system, sans-serif;
      font-size: 28px;
      outline: none;
      margin-bottom: 2px;
    }
    .editable-date {
      font-size: 11px;
      color: #bcaea1;
      outline: none;
      margin-bottom: 8px;
      display: inline-block;
    }
    .editable-desc {
      font-size: 12px;
      color: #7c756b;
      line-height: 1.5;
      outline: none;
    }

    .card-body {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      margin: 15px 0;
      min-height: 100px;
    }

    .cup-sticker {
      max-width: 90%;
      max-height: 100%; 
      object-fit: contain;
      filter: drop-shadow(0 8px 16px rgba(0,0,0,0.12));
      user-select: none;
      cursor: pointer;
    }

    .upload-box {
      width: 85%;
      height: 85%;
      max-height: 280px;
      border: 1px dashed #c4beb6;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      color: #8c867e;
    }
    .upload-box .icon { font-size: 32px; margin-bottom: 8px; font-weight: 300; }
    .upload-box p { font-size: 11px; letter-spacing: 1px; }

    /* 上传进度条 */
    .upload-progress {
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background: rgba(252,251,250,0.95);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      z-index: 20;
    }
    .upload-progress.active { display: flex; }
    
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #e5e1da;
      border-top: 3px solid #8c867e;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    .progress-text {
      font-size: 12px;
      color: #8c867e;
      text-align: center;
      line-height: 1.6;
    }
    
    .progress-bar {
      width: 80%;
      height: 4px;
      background-color: #e5e1da;
      border-radius: 2px;
      margin-top: 15px;
      overflow: hidden;
    }
    
    .progress-fill {
      height: 100%;
      background-color: #8c867e;
      border-radius: 2px;
      transition: width 0.3s ease;
      width: 0%;
    }

    .card-footer { 
      text-align: center; 
      flex-shrink: 0; 
    }
    .editable-spec {
      font-family: 'Wanwan', sans-serif;
      font-size: 11.5px;
      color: #8c867e;
      margin-bottom: 5px;
      outline: none;
    }
    .editable-disclaimer {
      font-family: 'Wanwan', sans-serif;
      font-size: 9.5px;
      color: #bcaea1;
      outline: none;
      line-height: 1.3;
    }

    /* --- 🔔 优化：视图2：手账日历区域 --- */
    .calendar-wrapper {
      flex: 1;
      display: none; 
      flex-direction: column;
      padding: 10px 18px 18px 18px;
      background-color: #f3f1ed; 
      overflow-y: auto;
    }

    .calendar-title-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
      padding: 0 5px;
      flex-shrink: 0;
    }
    #calendar-month-title {
      font-family: 'Wanwan', sans-serif;
      font-size: 24px;
      color: #4a6eb1; 
      font-weight: bold;
      letter-spacing: 1px;
    }
    .cal-nav-btn {
      background: none;
      border: none;
      font-size: 18px;
      color: #8c867e;
      cursor: pointer;
      padding: 5px 10px;
    }

    .calendar-container-card {
      background-color: #ffffff;
      border-radius: 28px;
      padding: 20px 16px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.03);
      display: flex;
      flex-direction: column;
      flex-shrink: 0;
    }

    .calendar-week-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      text-align: center;
      margin-bottom: 15px;
      flex-shrink: 0;
    }
    .week-day {
      font-size: 12px;
      color: #8c867e;
      font-weight: 500;
    }

    .calendar-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px 6px;
      background-color: transparent;
      border: none;
    }

    .calendar-cell {
      background-color: #faf8f5; 
      border-radius: 18px; 
      position: relative;
      padding: 3px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      aspect-ratio: 1 / 1.15;
      cursor: pointer;
      border: none;
      transition: transform 0.1s, background-color 0.2s;
    }
    .calendar-cell:active {
      transform: scale(0.95);
    }
    .calendar-cell.empty {
      background-color: transparent;
      cursor: default;
      pointer-events: none;
    }

    .calendar-cell.today {
      background-color: #bcaea1; 
    }
    .calendar-cell.today .day-number {
      color: #ffffff;
      font-weight: bold;
    }

    .day-number {
      font-size: 13px;
      color: #5c564e;
      font-weight: 500;
    }

    .calendar-cell-sticker {
      width: 100%;
      height: 100%;
      object-fit: contain;
      filter: drop-shadow(0 4px 8px rgba(0,0,0,0.08));
    }

    .bottom-bar {
      padding: 12px 20px 15px 20px;
      border-top: 1px solid #f3f1ed;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background-color: #fcfbfa;
      z-index: 10;
    }

    .bottom-left-group {
      display: flex;
      align-items: center;
      gap: 15px;
    }
    .view-toggle-btn {
      font-size: 12px;
      color: #8c867e;
      cursor: pointer;
      font-weight: 500;
      border-bottom: 1px dashed #c4beb6;
      padding-bottom: 1px;
    }

    .dots { display: flex; gap: 5px; }
    .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background-color: #e5e1da;
      transition: background-color 0.3s;
    }
    .dot.active { background-color: #8c867e; }

    .btn-group {
      display: flex;
      gap: 12px;
    }
    .btn {
      background: none;
      border: none;
      font-size: 13.5px;
      font-weight: bold;
      color: #5c564e;
      cursor: pointer;
      padding: 6px 4px;
      transition: opacity 0.15s;
    }
    .btn:active { opacity: 0.6; }
    .btn-primary { background-color: transparent; color: #1a1a1a; }
    .btn-danger { background-color: transparent; color: #d32f2f; font-weight: normal; }

    /* --- 💰 价签贴纸（逆时针旋转 7°）--- */
    .price-sticker-wrap {
      position: absolute;
      display: none;
      width: 130px;
      max-width: 42%;
      min-width: 90px;
      z-index: 5;
      pointer-events: auto;
      cursor: pointer;
      user-select: none;
      transition: transform 0.1s;
      transform: rotate(-7deg);
    }
    .price-sticker-wrap:active { transform: scale(0.95) rotate(-7deg); }
    .price-sticker-wrap img {
      width: 100%;
      height: auto;
      display: block;
      pointer-events: none;
    }
    .price-sticker-text {
      position: absolute;
      top: 52%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-family: 'Wanwan', -apple-system, sans-serif;
      font-size: 22px;
      font-weight: bold;
      color: #ffffff;
      text-shadow: 0 1px 3px rgba(0,0,0,0.25);
      min-width: 60px;
      text-align: center;
      outline: none;
      line-height: 1;
      pointer-events: auto;
    }
    .price-sticker-text:empty:before {
      content: "¥0";
      opacity: 0.5;
    }

    /* 小屏手机适配 */
    @media (max-width: 380px) {
      .calendar-container-card {
        padding: 12px 8px;
        border-radius: 20px;
      }
      .calendar-grid {
        gap: 6px 4px;
      }
      .calendar-cell {
        border-radius: 13px;
      }
      #calendar-month-title {
        font-size: 20px;
      }
      .card {
        padding: 10px 24px 20px 24px;
      }
    }
  </style>
</head>

    <!-- 顶部状态栏 -->
    <div class="top-bar">
      <div class="time" id="live-clock">0000-00-00 00:00:00</div>
      <div class="loading-status" id="model-status">云端引擎就绪</div>
    </div>

    <!-- 隐藏的上传文件表单 -->
    <input type="file" id="global-uploader" accept="image/*" style="display: none;">

    <!-- 视图1：滑动海报卡片 -->
    <div class="cards-wrapper" id="cards-container">

    </div>

    </div>

    <!-- 底部控制栏 -->
    <div class="bottom-bar">
      <div class="bottom-left-group">

        <button class="btn btn-danger" id="delete-btn" onclick="deleteCurrentCup()" style="display:none;">删除</button>
      </div>
    </div>
  </div>

  <script>
    // 控制台虚拟日志
    function printLog(msg, isError = false) {
      console.log(isError ? "[ERROR] " + msg : "[LOG] " + msg);
    }
  </script>

  <script>
    // 强制单线程高兼容配置
    ort.env.wasm.numThreads = 1; 
    ort.env.wasm.simd = false;   
    ort.env.wasm.proxy = false;  

    // 国内 BootCDN WASM
    ort.env.wasm.wasmPaths = "https://cdn.bootcdn.net/ajax/libs/onnxruntime-web/1.18.0/";
    
    // 官方原站无限制模型
    const MODEL_URL = "https://huggingface.co/Cristiants/test1/resolve/main/RMBG/onnx/model_quantized.onnx";

    let session = null;
    let activeCardIndex = 0;
    let targetUploadIndex = 0;
    let currentViewMode = "card";
    let isProcessing = false; // 防止重复上传

    // 内存数据集中存储中心
    let cardsData = []; 

    // 默认设置为手账当前年份与月份
    let calendarYear = 2026;
    let calendarMonth = 6; 

    const monthNames = ["JANUARY", "FEBRUARY", "MARCH", "APRIL", "MAY", "JUNE", "JULY", "AUGUST", "SEPTEMBER", "OCTOBER", "NOVEMBER", "DECEMBER"];

    // 初始化 Supabase 数据库客户端
    let useCloud = false;
    let supabaseClient = null;
    if (typeof supabase !== "undefined" && SUPABASE_URL && SUPABASE_ANON_KEY) {
      try {
        supabaseClient = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
        useCloud = true;
        console.log("☁️ Supabase 云同步系统联通！");
      } catch (e) {
        console.error("Supabase 启动失败:", e);
      }
    }

    // 时钟逻辑
    function updateClock() {
      const now = new Date();
      const pad = (n) => String(n).padStart(2, '0');
      const timeStr = `${now.getFullYear()}-${pad(now.getMonth()+1)}-${pad(now.getDate())} ${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
      document.getElementById("live-clock").innerText = timeStr;
    }
    setInterval(updateClock, 1000);
    updateClock();

    // 加载 AI 模型（降级兜底，仅在云端不可用时调用）
    async function loadLocalModel() {
      const statusEl = document.getElementById("model-status");
      try {
        printLog("正在拉取贴纸计算模型...");
        session = await ort.InferenceSession.create(MODEL_URL, { executionProviders: ['webgl'] });
        printLog("AI贴纸引擎就绪");
        statusEl.innerText = "引擎就绪";
        statusEl.style.color = "#4caf50";
      } catch (err) {
        console.warn("GPU加载异常，降级WASM...", err);
        try {
          session = await ort.InferenceSession.create(MODEL_URL, { executionProviders: ['wasm'] });
          printLog("AI贴纸引擎就绪 (WASM)");
          statusEl.innerText = "引擎就绪";
          statusEl.style.color = "#4caf50";
        } catch (wasmErr) {
          console.error("加载失败: ", wasmErr);
          statusEl.innerText = "加载失败";
          statusEl.style.color = "#ff5252";
        }
      }
    }

    // 触发图片选择
    function triggerUpload(cardIndex) {
      if (isProcessing) {
        alert("正在处理中，请稍候...");
        return;
      }
      targetUploadIndex = cardIndex;
      document.getElementById("global-uploader").click();
    }

    // 更新上传进度 UI
    function showUploadProgress(step) {
      const progressEl = document.getElementById(`progress-${targetUploadIndex}`);
      if (!progressEl) return;
      
      const fill = progressEl.querySelector('.progress-fill');
      const text = progressEl.querySelector('.progress-text');
      
      const steps = {
        uploading: { percent: 20, text: '上传图片中...' },
        processing: { percent: 60, text: 'AI 正在抠图中...' },
        saving: { percent: 90, text: '保存完成中...' },
        success: { percent: 100, text: '处理完成！' }
      };
      
      const config = steps[step] || steps.processing;
      fill.style.width = config.percent + '%';
      text.innerText = config.text;
    }

    // 隐藏上传进度
    function hideUploadProgress() {
      const progressEl = document.getElementById(`progress-${targetUploadIndex}`);
      if (progressEl) {
        progressEl.classList.remove('active');
      }
    }

    // 显示上传进度容器
    function showProgressContainer() {
      const container = document.getElementById(`progress-${targetUploadIndex}`);
      if (container) {
        container.classList.add('active');
      }
    }

    // Remove.bg API 抠图
    async function processWithRemoveBG(file) {
      const formData = new FormData();
      formData.append("image_file", file);
      formData.append("size", "auto");
      
      const response = await fetch(REMOVE_BG_API_URL, {
        method: "POST",
        headers: {
          "X-Api-Key": REMOVE_BG_API_KEY
        },
        body: formData
      });

      if (!response.ok) {
        const errorData = await response.json().catch(() => ({}));
        throw new Error(errorData.errors?.[0]?.title || `API 错误: ${response.status}`);
      }

      const blob = await response.blob();
      return URL.createObjectURL(blob);
    }

    // 本地 ONNX 抠图（降级方案）
    async function processLocally(imgEl) {
      const size = 1024;
      const canvas = document.createElement("canvas");
      canvas.width = size;
      canvas.height = size;
      const ctx = canvas.getContext("2d");
      ctx.drawImage(imgEl, 0, 0, size, size);
      
      const imageData = ctx.getImageData(0, 0, size, size);
      const { data } = imageData;
      const float32Data = new Float32Array(3 * size * size);
      
      for (let y = 0; y < size; y++) {
        for (let x = 0; x < size; x++) {
          const idx = (y * size + x) * 4;
          const pos = y * size + x;
          float32Data[pos] = (data[idx] / 255.0) - 0.5;
          float32Data[size * size + pos] = (data[idx + 1] / 255.0) - 0.5;
          float32Data[2 * size * size + pos] = (data[idx + 2] / 255.0) - 0.5;
        }
      }

      const tensor = new ort.Tensor("float32", float32Data, [1, 3, size, size]);
      const feeds = {};
      feeds[session.inputNames[0]] = tensor;
      const outputs = await session.run(feeds);
      const maskData = outputs[session.outputNames[0]].data;

      const maskCanvas = document.createElement("canvas");
      maskCanvas.width = 1024;
      maskCanvas.height = 1024;
      const mCtx = maskCanvas.getContext("2d");
      const mImgData = mCtx.createImageData(1024, 1024);
      for(let i=0; i<maskData.length; i++) {
        const alpha = maskData[i] > 0.5 ? 255 : 0;
        const idx = i * 4;
        mImgData.data[idx] = 255; 
        mImgData.data[idx+1] = 255; 
        mImgData.data[idx+2] = 255;
        mImgData.data[idx+3] = alpha;
      }
      mCtx.putImageData(mImgData, 0, 0);

      const maxOutputSize = 800; 
      let outW = imgEl.naturalWidth;
      let outH = imgEl.naturalHeight;
      if(outW > maxOutputSize || outH > maxOutputSize) {
        const scale = maxOutputSize / Math.max(outW, outH);
        outW = Math.round(outW * scale);
        outH = Math.round(outH * scale);
      }

      const originCanvas = document.createElement("canvas");
      originCanvas.width = outW; 
      originCanvas.height = outH;
      const oCtx = originCanvas.getContext("2d");
      oCtx.drawImage(imgEl, 0, 0, outW, outH);

      const resizedMaskCanvas = document.createElement("canvas");
      resizedMaskCanvas.width = outW; 
      resizedMaskCanvas.height = outH;
      const rmCtx = resizedMaskCanvas.getContext("2d");
      rmCtx.drawImage(maskCanvas, 0, 0, outW, outH);

      const cutoutCanvas = document.createElement("canvas");
      cutoutCanvas.width = outW; 
      cutoutCanvas.height = outH;
      const cCtx = cutoutCanvas.getContext("2d");
      const originalImgData = oCtx.getImageData(0,0,outW,outH);
      const rMaskImgData = rmCtx.getImageData(0,0,outW,outH);
      for(let i=0; i<originalImgData.data.length/4; i++) {
        const idx = i*4;
        originalImgData.data[idx+3] = rMaskImgData.data[idx+3];
      }
      cCtx.putImageData(originalImgData,0,0);

      const borderSize = 12; 
      const paddedW = outW + borderSize * 2 + 10;
      const paddedH = outH + borderSize * 2 + 10;

      const finalCanvas = document.createElement("canvas");
      finalCanvas.width = paddedW; 
      finalCanvas.height = paddedH;
      const fCtx = finalCanvas.getContext("2d");

      const centerOffsetX = borderSize + 5;
      const centerOffsetY = borderSize + 5;
      
      for(let i=0; i<32; i++) {
        const angle = (i / 32) * Math.PI * 2;
        const dx = Math.cos(angle) * borderSize + centerOffsetX;
        const dy = Math.sin(angle) * borderSize + centerOffsetY;
        fCtx.drawImage(cutoutCanvas, dx, dy);
      }
      fCtx.globalCompositeOperation = "source-in";
      fCtx.fillStyle = "#ffffff";
      fCtx.fillRect(0, 0, paddedW, paddedH);

      fCtx.globalCompositeOperation = "source-over";
      fCtx.drawImage(cutoutCanvas, centerOffsetX, centerOffsetY);

      return finalCanvas.toDataURL("image/png");
    }

    // 处理上传的文件
    document.getElementById("global-uploader").addEventListener("change", async (e) => {
      const file = e.target.files[0];
      if(!file) return;

      isProcessing = true;
      const statusEl = document.getElementById("model-status");
      statusEl.innerText = "正在上传...";
      statusEl.style.color = "#e64a19";

      showProgressContainer();
      showUploadProgress('uploading');

      try {
        // 先尝试使用 Remove.bg API
        let dataUrl;
        
        try {
          statusEl.innerText = "AI 抠图中...";
          showUploadProgress('processing');
          dataUrl = await processWithRemoveBG(file);
          statusEl.innerText = "保存中...";
          showUploadProgress('saving');
        } catch (apiError) {
          console.warn("Remove.bg API 失败，降级到本地模式:", apiError);
          statusEl.innerText = "云端不可用，使用本地模式...";
          
          // 降级到本地 ONNX
          if (!session) {
            await loadLocalModel();
          }
          
          const tempImg = new Image();
          tempImg.src = URL.createObjectURL(file);
          await new Promise(resolve => tempImg.onload = resolve);
          
          dataUrl = await processLocally(tempImg);
        }

        // 存入内存与数据库
        cardsData[targetUploadIndex].stickerSrc = dataUrl;
        await saveCardToStorage(cardsData[targetUploadIndex]);

        // 重渲染界面
        renderAllCards();
        renderCalendarGrid();
        
        statusEl.innerText = "引擎就绪";
        statusEl.style.color = "#4caf50";
        showUploadProgress('success');
        
        setTimeout(() => {
          hideUploadProgress();
        }, 1000);

      } catch (err) {
        console.error("抠图失败: ", err);
        statusEl.innerText = "抠图失败";
        statusEl.style.color = "#ff5252";
        alert("抠图失败：" + err.message);
        hideUploadProgress();
      } finally {
        isProcessing = false;
        e.target.value = ""; 
      }
    });

    // --- 💾 统一存储读写管理模块 ---

    // 从存储中心载入全部卡片
    async function loadAllCards() {
      if (useCloud && supabaseClient) {
        try {
          const { data, error } = await supabaseClient
            .from('milk_tea_cards')
            .select('*')
            .order('date', { ascending: true });
            
          if (error) throw error;

          let cloudCards = data.map(item => ({
            id: item.id,
            title: item.title,
            date: item.date,
            desc: item.desc,
            spec: item.spec,
            disclaimer: item.disclaimer,
            price: item.price || "¥0",
            stickerSrc: item.sticker_url
          }));

          // ===== 自动同步：把本地独有的卡片（如离线时创建的）并回云端，避免内容丢失 =====
          const cache = localStorage.getItem('tady_dreak_cards');
          if (cache) {
            let localCards = [];
            try { localCards = JSON.parse(cache); } catch (e) { localCards = []; }
            const cloudIds = new Set(cloudCards.map(c => c.id));
            const needPush = localCards.filter(lc => lc && lc.id && !cloudIds.has(lc.id));
            if (needPush.length) {
              cloudCards.push(...needPush);
              cardsData = cloudCards;
              for (const lc of needPush) {
                await saveCardToStorage(lc);
              }
            }
          }
          cardsData = cloudCards;
        } catch (e) {
          console.error("云加载失败:", e);
          loadFromLocal();
        }
      } else {
        loadFromLocal();
      }

      // 预设初始卡片
      if (cardsData.length === 0) {
        cardsData.push({
          id: String(Date.now()),
          title: "芒芭芒芭芒兰吧",
          date: "2026-07-13",
          desc: "冰沙，花香奇兰，芭乐汁，芒果，0脂脆波波，少少甜",
          spec: "500ml, 不支持升杯",
          disclaimer: "DIY风味独一无二，若实际口感与预期存在差异，敬请谅解",
          price: "¥0",
          stickerSrc: ""
        });
      }

      renderAllCards();
      renderCalendarGrid();
    }

    function loadFromLocal() {
      const cache = localStorage.getItem('tady_dreak_cards');
      if (cache) {
        cardsData = JSON.parse(cache);
      }
    }

    // 保存卡片
    async function saveCardToStorage(card) {
      if (useCloud && supabaseClient) {
        try {
          let imageUrl = card.stickerSrc;
          
          if (card.stickerSrc && card.stickerSrc.startsWith('data:image')) {
            const base64Response = await fetch(card.stickerSrc);
            const blob = await base64Response.blob();
            
            const fileName = `sticker_${card.id}.png`;
            const { error: uploadError } = await supabaseClient
              .storage
              .from('stickers')
              .upload(fileName, blob, {
                cacheControl: '3600',
                upsert: true
              });
            
            if (uploadError) throw uploadError;
            
            const { data: publicUrlData } = supabaseClient
              .storage
              .from('stickers')
              .getPublicUrl(fileName);
              
            imageUrl = publicUrlData.publicUrl;
            card.stickerSrc = imageUrl;
          }

          const { error: dbError } = await supabaseClient
            .from('milk_tea_cards')
            .upsert({
              id: card.id,
              title: card.title,
              date: card.date,
              desc: card.desc,
              spec: card.spec,
              disclaimer: card.disclaimer,
              price: card.price || "¥0",
              sticker_url: imageUrl || ""
            }, { onConflict: 'id' });

          if (dbError) throw dbError;
          // 同时写入本地缓存，断网时也能看到最近一次同步的内容
          localStorage.setItem('tady_dreak_cards', JSON.stringify(cardsData));
        } catch (e) {
          console.error("云保存失败:", e);
          localStorage.setItem('tady_dreak_cards', JSON.stringify(cardsData));
        }
      } else {
        localStorage.setItem('tady_dreak_cards', JSON.stringify(cardsData));
      }
    }

    // 从存储中心删除某卡片
    async function deleteCardFromStorage(cardId) {
      if (useCloud && supabaseClient) {
        try {
          const { error: dbError } = await supabaseClient
            .from('milk_tea_cards')
            .delete()
            .eq('id', cardId);
            
          if (dbError) throw dbError;

          const fileName = `sticker_${cardId}.png`;
          await supabaseClient.storage.from('stickers').remove([fileName]);
        } catch (e) {
          console.error("云端删除失败:", e);
        }
      }
      localStorage.setItem('tady_dreak_cards', JSON.stringify(cardsData));
    }

    // --- 🛠️ 卡片数据操作与渲染中心 ---

    function renderAllCards() {
      const container = document.getElementById("cards-container");
      container.innerHTML = "";

      cardsData.forEach((card, index) => {
        const cardHtml = `
          <div class="card" data-id="${card.id}" data-index="${index}">
            <div class="card-header">
              <div class="editable-title edit-tip" contenteditable="true" onblur="onCardFieldChange('${card.id}', 'title', this.innerText)">${card.title}</div>
              <div class="editable-date edit-tip" contenteditable="true" onblur="onCardDateChange('${card.id}', this)">${card.date}</div>
              <div class="editable-desc edit-tip" contenteditable="true" onblur="onCardFieldChange('${card.id}', 'desc', this.innerText)">${card.desc}</div>
            </div>

            <div class="card-body">
              <div class="upload-box" onclick="triggerUpload(${index})" style="display: ${card.stickerSrc ? 'none' : 'flex'}">
                <div class="icon">＋</div>
                <p>点击拍照生成贴纸</p>
              </div>
              <img class="cup-sticker" id="cup-${card.id}" src="${card.stickerSrc || ''}" style="display: ${card.stickerSrc ? 'block' : 'none'}" onclick="triggerUpload(${index})" onload="positionPriceSticker('${card.id}')" title="点击更换图片">
              
              <!-- 上传进度层 -->
              <div class="upload-progress" id="progress-${index}">
                <div class="spinner"></div>
                <div class="progress-text">上传中...</div>
                <div class="progress-bar">
                  <div class="progress-fill"></div>
                </div>
              </div>

              <!-- 💰 价签贴纸 -->
              <div class="price-sticker-wrap" id="price-${card.id}" data-card-id="${card.id}" onclick="editPrice('${card.id}')" style="display:${card.stickerSrc ? 'block' : 'none'}">
                <img src="${PRICE_STICKER_BASE64}" alt="price sticker">
                <div class="price-sticker-text" contenteditable="true" onblur="onPriceChange('${card.id}', this.innerText)" onclick="event.stopPropagation()">${card.price || '¥0'}</div>
              </div>
            </div>

            <div class="card-footer">
              <div class="editable-spec edit-tip" contenteditable="true" onblur="onCardFieldChange('${card.id}', 'spec', this.innerText)">${card.spec}</div>
              <div class="editable-disclaimer edit-tip" contenteditable="true" onblur="onCardFieldChange('${card.id}', 'disclaimer', this.innerText)">${card.disclaimer}</div>
            </div>
          </div>
        `;
        container.insertAdjacentHTML('beforeend', cardHtml);
      });

      updateIndicators();
      // 等布局落位后，把价签贴到对应饮品图区域
      requestAnimationFrame(repositionAllPriceStickers);
    }

    function onCardFieldChange(cardId, field, value) {
      const card = cardsData.find(c => c.id === cardId);
      if (card) {
        card[field] = value.trim();
        saveCardToStorage(card);
        renderCalendarGrid(); 
      }
    }

    // ---- 💰 价签定位与编辑 ----
    function positionPriceSticker(cardId) {
      const price = document.getElementById(`price-${cardId}`);
      const cup = document.getElementById(`cup-${cardId}`);
      const body = price ? price.parentElement : null; // .card-body
      if (!price || !body) return;
      // 没有饮品图就不显示价签
      if (!cup || !cup.getAttribute('src')) { price.style.display = 'none'; return; }
      // 等布局落位后再按固定比例定位
      requestAnimationFrame(() => {
        const bodyRect = body.getBoundingClientRect();
        const size = Math.max(90, Math.min(130, bodyRect.width * 0.3));
        price.style.display = 'block';
        price.style.width = size + 'px';
        // 贴纸左上角落在卡片区域：从上 10%、从左 10%
        price.style.left = (bodyRect.width * 0.10) + 'px';
        price.style.top = (bodyRect.height * 0.10) + 'px';
      });
    }
    function repositionAllPriceStickers() {
      document.querySelectorAll('.price-sticker-wrap[data-card-id]').forEach(el => {
        positionPriceSticker(el.getAttribute('data-card-id'));
      });
    }
    window.addEventListener('resize', repositionAllPriceStickers);

    function onPriceChange(cardId, value) {
      const card = cardsData.find(c => c.id === cardId);
      if (card) {
        let price = value.trim();
        // 如果没有 ¥ 符号，自动加上
        if (price && !price.startsWith('¥') && !price.startsWith('￥') && !price.startsWith('$')) {
          price = '¥' + price;
        }
        card.price = price;
        saveCardToStorage(card);
      }
    }
    function editPrice(cardId) {
      const card = cardsData.find(c => c.id === cardId);
      if (!card) return;
      const newPrice = prompt("请输入价格:", card.price || "¥0");
      if (newPrice === null) return;
      let price = newPrice.trim();
      if (price && !price.startsWith('¥') && !price.startsWith('￥') && !price.startsWith('$')) {
        price = '¥' + price;
      }
      card.price = price;
      saveCardToStorage(card);
      renderAllCards();
    }

    function onCardDateChange(cardId, element) {
      const dateText = element.innerText.trim();
      const datePattern = /^\d{4}-\d{2}-\d{2}$/;
      const card = cardsData.find(c => c.id === cardId);
      
      if (!datePattern.test(dateText)) {
        alert("日期格式不合法，请输入标准 YYYY-MM-DD 格式（例如：2026-07-13）");
        element.innerText = card ? card.date : "2026-07-13";
        return;
      }

      if (card) {
        card.date = dateText;
        saveCardToStorage(card);
        renderCalendarGrid(); 
      }
    }

    async function addCup(targetDateString = null) {
      let defaultDate = targetDateString;
      if (!defaultDate) {
        const d = new Date();
        const pad = (n) => String(n).padStart(2, '0');
        defaultDate = `${d.getFullYear()}-${pad(d.getMonth()+1)}-${pad(d.getDate())}`;
      }

      const newCard = {
        id: String(Date.now()),
        title: "我的新调饮",
        date: defaultDate,
        desc: "点击输入配料、冰度、糖度描述...",
        spec: "500ml, 不支持升杯",
        disclaimer: "DIY风味独一无二，若实际口感与预期存在差异，敬请谅解",
        price: "¥0",
        stickerSrc: ""
      };

      cardsData.push(newCard);
      await saveCardToStorage(newCard);

      renderAllCards();
      renderCalendarGrid();

      if (currentViewMode !== "card") {
        toggleMainView();
      }

      const container = document.getElementById("cards-container");
      const nextIndex = cardsData.length - 1;
      setTimeout(() => {
        container.scrollTo({ left: container.clientWidth * nextIndex, behavior: "smooth" });
      }, 50);
    }

    async function deleteCurrentCup() {
      if(cardsData.length <= 1) return; 
      
      if(confirm("确定要删除当前这一杯的手账吗？")) {
        const activeCard = cardsData[activeCardIndex];
        
        cardsData.splice(activeCardIndex, 1);
        await deleteCardFromStorage(activeCard.id);

        const targetIdx = Math.max(0, activeCardIndex - 1);
        activeCardIndex = targetIdx;

        renderAllCards();
        renderCalendarGrid();

        const container = document.getElementById("cards-container");
        container.scrollTo({ left: container.clientWidth * targetIdx });
      }
    }

    function updateIndicators() {
      const container = document.getElementById("cards-container");
      const dotsContainer = document.getElementById("dots-container");
      const total = cardsData.length;
      
      dotsContainer.innerHTML = "";
      for (let i = 0; i < total; i++) {
        const dot = document.createElement("span");
        dot.className = `dot ${i === activeCardIndex ? 'active' : ''}`;
        dotsContainer.appendChild(dot);
      }

      document.getElementById("delete-btn").style.display = total > 1 ? "block" : "none";
    }

    document.getElementById("cards-container").addEventListener("scroll", (e) => {
      const container = e.target;
      const index = Math.round(container.scrollLeft / container.clientWidth);
      if(index !== activeCardIndex && index >= 0 && index < container.children.length) {
        activeCardIndex = index;
        updateIndicators();
      }
    });

    function saveActivePoster() {
      window.getSelection().removeAllRanges(); 
      
      const container = document.getElementById("cards-container");
      const activeCard = container.children[activeCardIndex];

      const editableElements = activeCard.querySelectorAll(".edit-tip");
      editableElements.forEach(el => el.classList.remove("edit-tip"));

      html2canvas(activeCard, {
        scale: 2, 
        useCORS: true,
        backgroundColor: "#fcfbfa"
      }).then(canvas => {
        editableElements.forEach(el => el.classList.add("edit-tip"));

        const link = document.createElement("a");
        link.download = `我的饮品手账_${activeCardIndex + 1}.png`;
        link.href = canvas.toDataURL("image/png");
        link.click();
      }).catch(err => {
        console.error(err);
        alert("海报生成失败。");
        editableElements.forEach(el => el.classList.add("edit-tip"));
      });
    }

    function toggleMainView() {
      const cardWrapper = document.getElementById("cards-container");
      const calView = document.getElementById("calendar-view");
      const dots = document.getElementById("dots-container");
      const toggleText = document.getElementById("toggle-view-btn");

      if (currentViewMode === "card") {
        currentViewMode = "calendar";
        cardWrapper.style.display = "none";
        calView.style.display = "flex";
        dots.style.display = "none"; 
        toggleText.innerText = "卡片视图";
        renderCalendarGrid(); 
      } else {
        currentViewMode = "card";
        cardWrapper.style.display = "flex";
        calView.style.display = "none";
        dots.style.display = "flex";
        toggleText.innerText = "日历视图";
        
        setTimeout(() => {
          cardWrapper.scrollTo({ left: cardWrapper.clientWidth * activeCardIndex });
        }, 10);
      }
    }

    function renderCalendarGrid() {
      const grid = document.getElementById("calendar-grid-cells");
      grid.innerHTML = "";

      document.getElementById("calendar-month-title").innerText = `${monthNames[calendarMonth]} ${calendarYear}`;

      const firstDayIndex = new Date(calendarYear, calendarMonth, 1).getDay();
      const totalDays = new Date(calendarYear, calendarMonth + 1, 0).getDate();

      const today = new Date();
      const todayYear = today.getFullYear();
      const todayMonth = today.getMonth();
      const todayDate = today.getDate();

      for (let i = 0; i < firstDayIndex; i++) {
        const emptyCell = document.createElement("div");
        emptyCell.className = "calendar-cell empty";
        grid.appendChild(emptyCell);
      }

      for (let day = 1; day <= totalDays; day++) {
        const cell = document.createElement("div");
        cell.className = "calendar-cell";
        
        const pad = (n) => String(n).padStart(2, '0');
        const cellDateStr = `${calendarYear}-${pad(calendarMonth + 1)}-${pad(day)}`;

        const isTodayCell = (calendarYear === todayYear && calendarMonth === todayMonth && day === todayDate);
        if (isTodayCell) {
          cell.classList.add("today");
        }

        const matchedCard = cardsData.find(c => c.date === cellDateStr);

        if (matchedCard) {
          if (matchedCard.stickerSrc) {
            const thumb = document.createElement("img");
            thumb.src = matchedCard.stickerSrc;
            thumb.className = "calendar-cell-sticker";
            cell.appendChild(thumb);
          } else {
            const numLabel = document.createElement("div");
            numLabel.className = "day-number";
            numLabel.innerText = day;
            cell.appendChild(numLabel);
          }
          
          cell.onclick = () => {
            const targetIdx = cardsData.indexOf(matchedCard);
            activeCardIndex = targetIdx;
            updateIndicators();
            toggleMainView(); 
          };
        } else {
          const numLabel = document.createElement("div");
          numLabel.className = "day-number";
          numLabel.innerText = day;
          cell.appendChild(numLabel);

          cell.onclick = () => {
            if (confirm(`今天(${cellDateStr})还没有记手账，要为这天新建一杯吗？`)) {
              addCup(cellDateStr); 
              activeCardIndex = cardsData.length - 1;
              updateIndicators();
              triggerUpload(cardsData.length - 1); 
            }
          };
        }

        grid.appendChild(cell);
      }
    }

    function navigateMonth(direction) {
      calendarMonth += direction;
      if (calendarMonth > 11) {
        calendarMonth = 0;
        calendarYear += 1;
      } else if (calendarMonth < 0) {
        calendarMonth = 11;
        calendarYear -= 1;
      }
      renderCalendarGrid();
    }

    loadAllCards();
  </script>
